<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư cho chị Nhí 💖</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow:hidden;
}

/* Trang */
.page {
  display:none;
  position:fixed;
  inset:0;

  justify-content:center;
  align-items:center;
  flex-direction:column;

  padding:20px;
  text-align:center;
}

.active { display:flex; }

/* Nội dung */
h1 {
  color:white;
  font-size:26px;
  margin-bottom:10px;
}

p {
  color:white;
  font-size:17px;
  max-width:320px;
  line-height:1.6;
  white-space: pre-line;
}

/* Input + button */
input {
  padding:12px;
  border:none;
  border-radius:20px;
  width:80%;
  max-width:280px;
  text-align:center;
}

button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff6b81;
  font-weight:bold;
}

/* Fade */
.fade {
  animation: fade 1s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* Typewriter */
.typing {
  border-right: 2px solid white;
  white-space: pre-line;
  overflow: hidden;
}

/* Hearts nâng cấp */
.heart {
  position:fixed;
  bottom:-20px;
  animation: float 5s linear forwards;
}

@keyframes float {
  to {
    transform: translateY(-120vh) scale(1.8);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- Nhạc nền -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- HEART -->
<script>
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*20+15) + "px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
},300);
</script>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1 class="fade">Món Bảo thích?</h1>
  <input type="password" id="password" placeholder="Nhập mật khẩu...">
  <button onclick="openLetter()">Mở thư 💌</button>
  <p id="error"></p>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h1>Chúc mừng sinh nhật chị Nhí 🎂</h1>
  <p id="text2"></p>
  <button onclick="nextPage(3)">Tiếp →</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <h1>Cảm ơn chị 💖</h1>
  <p id="text3"></p>
  <button onclick="nextPage(4)">Tiếp →</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <h1>Sắp cưới rồi 💍</h1>
  <p id="text4"></p>
  <button onclick="nextPage(5)">Tiếp →</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
  <h1>Yêu chị nhiều 💕</h1>
  <p id="text5"></p>
</div>

<script>
const content = {
2: `Chúc chị một sinh nhật thật vui vẻ, luôn rạng rỡ và hạnh phúc!
Trong trí nhớ của em thì chị và em mới quen chỉ 1 năm nhưng có lẽ sự thật nhiều hơn thế...
Em chúc chị làm bánh ngon hơn, em sẽ thử đầu tiên và khen chị thiệt lòng.
Chị sẽ mở quán thành công và suôn sẻ, em sẽ là khách hàng đầu tiên nè Nhí 💕`,

3: `Cảm ơn chị đã luôn ở bên, quan tâm và chăm sóc em.
Chị mãi là người tuyệt vời nhất!
Dẫn em đi ăn, đi chơi, đi karaoke…
Em ấn tượng nhất chắc là tiếng Anh “tào lao” của chị 😆`,

4: `Chúc chị bước vào hành trình mới thật nhiều niềm vui,
luôn hạnh phúc bên người mà em và chị đều yêu quý ❤️
Lần đầu thấy chị khóc… em nhớ mãi.`,

5: `Dù sau này thế nào, chị vẫn luôn là chị của em.
Chúc chị mãi hạnh phúc 💖
Nhớ mua nhiều takoyaki cho Bảo nha 😆`
};

function typeEffect(el, text, speed=30){
  let i=0;
  el.innerHTML='';
  const interval = setInterval(()=>{
    el.innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  }, speed);
}

function openLetter(){
  const pass = document.getElementById('password').value.trim();
  if(pass === 'takoyaki'){
    document.getElementById('music').play();
    nextPage(2);
  } else {
    document.getElementById('error').innerText='Sai rồi 😢';
  }
}

function nextPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const current = document.getElementById('page'+page);
  current.classList.add('active');

  const textEl = document.getElementById('text'+page);
  if(textEl){
    typeEffect(textEl, content[page]);
  }
}
</script>

</body>
</html>
