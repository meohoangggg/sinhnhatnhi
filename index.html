<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư cho chị Nhí 💖</title>

<style>
body{
  margin:0;
  font-family:-apple-system, sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.page{
  display:none;
  position:fixed;
  inset:0;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}

.active{display:flex;}

h1{color:white;}
p{color:white;white-space:pre-line;}

input,button{
  padding:12px;
  border-radius:20px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Món Bảo thích?</h1>
  <input id="pass" type="password" placeholder="Nhập mật khẩu">
  <button id="btn">Mở thư 💌</button>
  <p id="err"></p>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h1>Chúc mừng sinh nhật chị Nhí 🎂</h1>
  <p>Chúc chị luôn hạnh phúc 💕</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  var btn = document.getElementById("btn");

  btn.addEventListener("click", function(){
    var v = document.getElementById("pass").value.trim();

    if(v === "takoyaki"){
      showPage(2);
    } else {
      document.getElementById("err").innerText = "Sai rồi 😢";
    }
  });

  function showPage(n){
    var pages = document.getElementsByClassName("page");
    for(var i=0;i<pages.length;i++){
      pages[i].classList.remove("active");
    }
    document.getElementById("p"+n).classList.add("active");
  }

});
</script>

</body>
</html>
